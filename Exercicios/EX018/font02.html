<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Roboto';
            src: url('fontes/Roboto-Regular.ttf') format('truetype');
            font-weight: 300;
            font-style: normal;
        }
        
        body{
            font-family: Roboto, sans-serif;
            font-size: 16px;
            font-weight: 300;
        }

        h1{
            font-family: 'Times New Roman', Times, serif;
            font-size: 3em;
        }
    </style>
</head>
