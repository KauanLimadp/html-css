<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
        div{
            display: inline-block;
            background-color: brown;
            border: 1px solid black;
            text-align: center;
            height: 200px;
            width: 200px;
            transition: 2s;
        }

        .div1:hover{
            background-color: yellow; 
        }

        div:active{
            background-color: green;
            transition:  .0s;
        }

        
        a:visited{
            color: red;
        }

        a:link{
            color: blue;
        }

        a:focus{
            color: blue;
            text-decoration: none;
            border: 2px solid fuchsia;
        }

        ul > li:nth-child(2){
            color:blueviolet;
        }

    </style>
</head>
<body>
   <div class="div1" id="d1">01</div>
   <div id="d2">02</div>
   <div id="d3">03</div>
   <a href="#">clique aqui</a> <br>
   <a href="#">link nao visitado</a>
   <ul type="disc">
    <li>item 1</li>
    <li>item 2</li>
   </ul>
</body>
</html>
